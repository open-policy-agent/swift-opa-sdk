name: Check

on:
  workflow_dispatch: {}
  pull_request: {}

# When a new revision is pushed to a PR, cancel all in-progress CI runs for that
# PR. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build Swift ${{ matrix.swift }}${{ matrix.xcode && format(', Xcode {0}', matrix.xcode) || '' }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            xcode: "16.2"
            swift: "6.0.3"
          - os: macos-latest
            xcode: "16.4"
            swift: "6.1" # We can't go more modern than 6.1.0 for the 6.1 runner, due to Xcode version support.
          - os: macos-latest
            xcode: "26.2"
            swift: "6.2.3"
          - os: ubuntu-latest
            swift: "6.0.3"
          - os: ubuntu-latest
            swift: "6.2"
    env:
      XCODE_VERSION: ${{ matrix.xcode }}
      DEVELOPER_DIR: "/Applications/Xcode_${{ matrix.xcode }}.app"
      SWIFT_VERSION: ${{ matrix.swift }}
    steps:
      - name: Select Xcode version
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select --switch "${DEVELOPER_DIR}/Contents/Developer"
          xcodebuild -version
      - name: Get latest Swiftly version
        if: runner.os == 'Linux'
        id: swiftly-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_VERSION=$(gh release view --repo swiftlang/swiftly --json tagName -q '.tagName')
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest Swiftly version: $LATEST_VERSION"
      - name: Setup Swiftly (version ${{ steps.swiftly-version.outputs.version }}) manually, installing toolchain version ${{ matrix.swift }}
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail  # Exit on error, undefined vars, and pipe failures
          VERSION=${{ steps.swiftly-version.outputs.version }}

          # Setup paths
          TMP_PATH="${RUNNER_TEMP}"

          HOME_DIR="${SWIFTLY_HOME_DIR:-${TMP_PATH}/home}"
          BIN_DIR="${SWIFTLY_BIN_DIR:-${TMP_PATH}/bin}"

          echo "SWIFTLY_HOME_DIR=${HOME_DIR}" >> $GITHUB_ENV
          echo "SWIFTLY_BIN_DIR=${BIN_DIR}" >> $GITHUB_ENV

          echo "${BIN_DIR}" >> $GITHUB_PATH

          echo "::debug::Using Swiftly home dir: ${HOME_DIR}"
          echo "::debug::Using Swiftly bin dir: ${BIN_DIR}"

          # Install prereqs:
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

          # We make no attempt to verify the swiftly tarball with
          # GPG here, because the site hosting the pubkeys is known
          # to block curl scraping when under load.
          curl -O https://download.swift.org/swiftly/linux/swiftly-${VERSION}-$(uname -m).tar.gz
          tar zxf swiftly-${VERSION}-$(uname -m).tar.gz

          echo "Initializing Swiftly"
          ./swiftly init --skip-install --quiet-shell-followup --assume-yes --no-modify-profile

          # Install the intended toolchain version:
          # Install Swift
          POST_INSTALL_SCRIPT="${TMP_PATH}/post-install.sh"

          echo "Installing Swift ${SWIFT_VERSION}"
          swiftly install --use "${SWIFT_VERSION}" --assume-yes --post-install-file "${POST_INSTALL_SCRIPT}"

          # Run post-install script if it exists
          if [ -f "${POST_INSTALL_SCRIPT}" ]; then
            echo "Running post-install script"
            bash "${POST_INSTALL_SCRIPT}"
          fi

          # Get Swift location and add to PATH
          LOCATION=$(swiftly use --print-location)
          echo "::debug::Swiftly installed Swift to ${LOCATION}"

          swiftly link

          echo "${LOCATION}" >> $GITHUB_PATH

      - name: Show Swift version
        run: swift --version
      - name: Fail if Swift version does not match expected version (${{ matrix.swift }})
        run: |
          SWIFT_OUTPUT=$(swift --version)
          echo "${SWIFT_OUTPUT}"
          # Check if our expected Swift version is the one in use.
          if ! echo "${SWIFT_OUTPUT}" | grep -q "${SWIFT_VERSION}"; then
            ACTUAL=$(echo "${SWIFT_OUTPUT}" | head -n 1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
            echo "::error::Expected Swift ${SWIFT_VERSION}, got ${ACTUAL}"
            echo "**Version Mismatch**: Expected \`${SWIFT_VERSION}\`, got \`${ACTUAL}\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install jemalloc
        if: runner.os == 'macOS'
        run: brew install jemalloc
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Build
        run: make build